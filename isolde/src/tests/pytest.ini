[pytest]
# Characterisation suite — see run_tests.py. Runs inside ChimeraX's Python.
addopts = -ra -q --import-mode=importlib
markers =
    fast: no OpenMM Context or GPU required (cheap, deterministic)
    integration: instantiates OpenMM / builds a System (still CPU-only here)
# Don't try to collect the legacy manual harness as automated tests.
python_files = test_*.py
python_classes = Test*
python_functions = test_*
